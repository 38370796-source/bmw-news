services:
  bloomberg-crawler:
    build: .
    container_name: bmw-news
    environment:
      # 必需：LLM API Key（支持 OpenAI 兼容接口，推荐 DeepSeek）
      - LLM_API_KEY=${LLM_API_KEY}
      # 可选：自定义 LLM 配置
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - BATCH_SIZE=${BATCH_SIZE:-15}
      # 代理配置（默认启用。如不需代理，设 USE_PROXY=false 并删掉 HTTP_PROXY）
      - USE_PROXY=${USE_PROXY:-true}
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7890}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7890}
      # 新闻网址（逗号分隔，可自定义多个来源）
      - NEWS_URLS=${NEWS_URLS:-https://www.bloomberg.com/asia,https://www.cnbc.com/world/?region=world}
      - OUTPUT_DIR=/app/output
    volumes:
      # 挂载输出目录，方便查看简报
      - ./output:/app/output
      # 缓存 crawl4ai 数据，加速重复运行
      - crawl4ai_cache:/app/.crawl4ai

volumes:
  crawl4ai_cache:
